[package]
name = "meganeura"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
description = "E-graph optimized neural network training on blade-graphics"
license = "MIT"

[dependencies]
blade-graphics = { git = "https://github.com/kvark/blade.git", branch = "main" }
blade-macros = { git = "https://github.com/kvark/blade.git", branch = "main" }
egglog = "2.0"
bytemuck = { version = "1", features = ["derive"] }
naga = { git = "https://github.com/gfx-rs/wgpu", rev = "9ed77372b413cffa52104e424338d9e655e6208e", features = ["wgsl-in", "wgsl-out"] }
serde = { version = "1", features = ["derive"] }
ron = "0.8"
log = "0.4"
env_logger = "0.11"

[[example]]
name = "mnist"
path = "examples/mnist.rs"
