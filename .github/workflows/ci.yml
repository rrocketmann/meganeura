name: CI
on:
  push:
    branches: ["main", "claude/*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build, Test, Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install lavapipe and Vulkan
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools libvulkan-dev

      - name: Verify lavapipe
        run: vulkaninfo --summary 2>&1 | head -30

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: GPU smoke test (lavapipe)
        run: cargo test --test gpu_smoke
